# ═══════════════════════════════════════════════════════════════════════════════
# AlertHive – Kafka on AKS (single-broker, demo/dev)
# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION NOTE:
#   Use Azure Event Hubs with Kafka-compatible endpoint instead of self-hosted
#   Kafka in AKS.  Azure Event Hubs is fully managed, scales automatically, and
#   has zero ops overhead.  Set KAFKA_BROKERS to your Event Hub namespace FQDN.
#
#   Example:
#     KAFKA_BROKERS: "your-eventhub.servicebus.windows.net:9093"
#
#   This file is provided for local / demo cluster usage only.
# ═══════════════════════════════════════════════════════════════════════════════

---
# ── Zookeeper ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerthive-zookeeper
  namespace: alerthive
  labels:
    app: alerthive-zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alerthive-zookeeper
  template:
    metadata:
      labels:
        app: alerthive-zookeeper
    spec:
      containers:
        - name: zookeeper
          image: bitnami/zookeeper:3.9
          ports:
            - containerPort: 2181
          env:
            - name: ALLOW_ANONYMOUS_LOGIN
              value: "yes"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: alerthive-zookeeper
  namespace: alerthive
spec:
  selector:
    app: alerthive-zookeeper
  ports:
    - port: 2181
      targetPort: 2181
  clusterIP: None

---
# ── Kafka Broker ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alerthive-kafka
  namespace: alerthive
  labels:
    app: alerthive-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alerthive-kafka
  template:
    metadata:
      labels:
        app: alerthive-kafka
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.7
          ports:
            - containerPort: 9092
              name: internal
          env:
            - name: KAFKA_CFG_ZOOKEEPER_CONNECT
              value: "alerthive-zookeeper:2181"
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://alerthive-kafka:9092"
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
            # Auto-create topics used by the API
            - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_CFG_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_CFG_DEFAULT_REPLICATION_FACTOR
              value: "1"
            # Retention: 7 days / 1 GiB per topic
            - name: KAFKA_CFG_LOG_RETENTION_HOURS
              value: "168"
            - name: KAFKA_CFG_LOG_RETENTION_BYTES
              value: "1073741824"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: kafka-data
              mountPath: /bitnami/kafka/data
      volumes:
        - name: kafka-data
          emptyDir: {}      # use PVC in production

---
apiVersion: v1
kind: Service
metadata:
  name: alerthive-kafka
  namespace: alerthive
spec:
  selector:
    app: alerthive-kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
  clusterIP: None
